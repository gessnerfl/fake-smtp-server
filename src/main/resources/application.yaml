server:
  port: 8080
  shutdown: graceful
  servlet:
    session:
      # Session timeout: 10 minutes default, maximum 24 hours (1440 minutes)
      timeout: ${FAKESMTP_WEBAPP_SESSION_TIMEOUT_MINUTES:10}m
      cookie:
        http-only: true
        same-site: Lax

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: '*'

spring:
  profiles:
    active: default

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:h2:mem:mail
    username: admin
    password: Test1234
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  data:
    web:
      pageable:
        size-parameter: size
        page-parameter: page
        default-page-size: 10
        one-indexed-parameters: false
        max-page-size: 1000

  h2:
    console:
      enabled: true

  mvc:
    hiddenmethod:
      filter:
        enabled: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: "UTC"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

fakesmtp:
  port: 8025
  webapp:
    authentication:
      username: ${FAKESMTP_WEBAPP_AUTH_USERNAME:}
      password: ${FAKESMTP_WEBAPP_AUTH_PASSWORD:}
    rate-limiting:
      enabled: ${FAKESMTP_WEBAPP_RATE_LIMITING_ENABLED:true}
      max-attempts: ${FAKESMTP_WEBAPP_RATE_LIMITING_MAX_ATTEMPTS:5}
      window-minutes: ${FAKESMTP_WEBAPP_RATE_LIMITING_WINDOW_MINUTES:1}
      cleanup-interval-minutes: ${FAKESMTP_WEBAPP_RATE_LIMITING_CLEANUP_INTERVAL_MINUTES:1}
      whitelist-localhost: ${FAKESMTP_WEBAPP_RATE_LIMITING_WHITELIST_LOCALHOST:true}
