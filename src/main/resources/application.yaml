server:
  port: 8080
  shutdown: graceful
  servlet:
    async-timeout: 5000
    session:
      cookie:
        http-only: true
        same-site: Lax

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info

spring:
  profiles:
    active: default

  lifecycle:
    timeout-per-shutdown-phase: 5s

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:h2:mem:mail
    username: admin
    password: Test1234
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  data:
    web:
      pageable:
        size-parameter: size
        page-parameter: page
        default-page-size: 10
        one-indexed-parameters: false
        max-page-size: 1000

  mvc:
    hiddenmethod:
      filter:
        enabled: true

  jackson:
    time-zone: "UTC"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

fakesmtp:
  port: 8025
  maxMessageSize: ${FAKESMTP_MAX_MESSAGE_SIZE:10MB}
  max-attachment-size: ${FAKESMTP_MAX_ATTACHMENT_SIZE:10MB}
  metrics:
    include-address-tags: ${FAKESMTP_METRICS_INCLUDE_ADDRESS_TAGS:false}
  webapp:
    authentication:
      username: ${FAKESMTP_WEBAPP_AUTH_USERNAME:}
      password: ${FAKESMTP_WEBAPP_AUTH_PASSWORD:}
    rate-limiting:
      enabled: ${FAKESMTP_WEBAPP_RATE_LIMITING_ENABLED:true}
      max-attempts: ${FAKESMTP_WEBAPP_RATE_LIMITING_MAX_ATTEMPTS:5}
      window-minutes: ${FAKESMTP_WEBAPP_RATE_LIMITING_WINDOW_MINUTES:1}
      cleanup-interval-minutes: ${FAKESMTP_WEBAPP_RATE_LIMITING_CLEANUP_INTERVAL_MINUTES:1}
      whitelist-localhost: ${FAKESMTP_WEBAPP_RATE_LIMITING_WHITELIST_LOCALHOST:true}
      trust-proxy-headers: ${FAKESMTP_WEBAPP_RATE_LIMITING_TRUST_PROXY_HEADERS:false}
    session:
      # Session timeout: 10 minutes default, maximum 24 hours (1440 minutes)
      session-timeout-minutes: ${FAKESMTP_WEBAPP_SESSION_TIMEOUT_MINUTES:10}
      sse-heartbeat-interval-seconds: ${FAKESMTP_WEBAPP_SSE_HEARTBEAT_INTERVAL_SECONDS:30}
      sse-event-send-timeout-seconds: ${FAKESMTP_WEBAPP_SSE_EVENT_SEND_TIMEOUT_SECONDS:5}
